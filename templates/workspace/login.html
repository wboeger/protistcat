{% extends "base.html" %}
{% block title %}Login — Workspace{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;align-items:center;min-height:calc(100vh - 200px)">
  <div class="card" style="width:100%;max-width:400px;padding:2.25rem 2.5rem">
    <div style="text-align:center;margin-bottom:1.6rem">
      <span style="font-size:2.2rem;display:block;margin-bottom:.4rem">🔒</span>
      <h2 style="margin:0">Workspace</h2>
      <p style="font-size:.82rem;color:var(--muted)">Acesso restrito a editores autorizados</p>
    </div>
    <form method="post">
      <div class="form-group"><label for="username">Usuário</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required></div>
      <div class="form-group"><label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.65rem">Entrar</button>
    </form>
    <p style="text-align:center;margin-top:1.2rem;font-size:.82rem">
      <a href="{{ url_for('index') }}" style="color:var(--primary-light);text-decoration:none">← Voltar à filogenia</a></p>
  </div>
</div>
{% endblock %}
